name: Publish container image to GHCR

# Image: ghcr.io/yellowhama/musu-marketer
# See musu-crawl-ai/.github/workflows/docker-publish.yml for the rationale.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/yellowhama/musu-marketer:${{ github.ref_name }}
            ghcr.io/yellowhama/musu-marketer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
